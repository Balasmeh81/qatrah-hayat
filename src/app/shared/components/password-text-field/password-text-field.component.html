<div
  class="form-inputs"
  [class.focused]="isFocused"
  [class.invalid-input]="isInvalid"
  data-aos="fade-down"
  data-aos-delay="400"
>
  @if (prefixIcon) {
    <i
      class="prefix-icon"
      [class]="prefixIcon"
      aria-hidden="true"
      data-aos="fade-down"
      data-aos-delay="450"
    ></i>
  } @else {
    <span class="prefix-spacer" aria-hidden="true"></span>
  }

  <input
    class="text-input"
    [id]="inputId"
    [type]="inputType"
    [placeholder]="placeholder"
    [formControl]="control"
    [autocomplete]="autocomplete"
    [readonly]="readonly"
    [disabled]="disabled"
    (focus)="onFocus()"
    (blur)="onBlur()"
    maxlength="64"
    data-aos="fade-down"
    data-aos-delay="450"
  />

  <button
    type="button"
    class="suffix-btn"
    (click)="togglePassword()"
    aria-label="Toggle password visibility"
    data-aos="fade-down"
    data-aos-delay="450"
  >
    <i
      class="fas"
      [ngClass]="{
        'fa-eye': !showPassword,
        'fa-eye-slash': showPassword,
      }"
      aria-hidden="true"
    ></i>
  </button>
</div>
